name: Price Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'
    - cron: '17 18 * * *'

permissions:
  contents: write

jobs:
  collect-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices
        run: python3 scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/errors.json data/prices.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): update phone prices"
          git push
